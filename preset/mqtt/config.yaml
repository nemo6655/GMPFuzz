# GMPFuzz configuration for MQTT protocol fuzzing (Mosquitto)
# Adapted from TDPFuzz's live555 configuration for MQTT

type: profuzzbench
project_name: mqtt
fuzzbench_project: mqtt
protocol_type: mqtt

target:
  options: "-P MQTT -D 10000 -q 3 -s 3 -E -K -R"

model:
  names:
    - codellama
  endpoints:
    - codellama/CodeLlama-13b-hf:http://192.168.31.53:8192

run:
  seeds: preset/mqtt/init_seeds
  max_generations: 20
  selection_strategy: lattice
  num_selected: 100
  genvariant_dir: "{ELMFUZZ_RUNDIR}/{GEN}/variants/"
  genoutput_dir: "{ELMFUZZ_RUNDIR}/{GEN}/seeds/"
  logdir: "{ELMFUZZ_RUNDIR}/{GEN}/logs"
  clean: true
  state_pools:
    - "0000"
    - "0001"
    - "0002"
    - "0003"
  rescue: true

# ASE (Adaptive Synchronization Epoch) configuration
ase:
  enabled: true           # Set to false to use fixed 1800s timeout
  T_min: 1800             # Minimum epoch duration (30 min floor for meaningful fuzzing)
  T_max: 7200             # Maximum epoch duration (2 hours cap per generation)
  T_default: 3600         # Default epoch when no history (1 hour)
  T_budget: 86400         # Total time budget (24 hours)
  tau_stall: 300           # Stall tolerance window (5 min, not 2)
  delta: 30               # Monitoring sample interval (seconds)
  alpha: 0.2              # EWMA smoothing factor (slower = less jumpy)
  beta: 0.02              # Growth rate saturation threshold (lower = harder to early-stop)
  gamma: 0.15             # LLM evolution boost coefficient
  T_llm_estimate: 2400    # Estimated LLM generation time per gen (40 min, realistic)

cli:
  genvariants_parallel:
    num_variants: 10
  getcov_fuzzbench:
    timeout: 60
    jobs: 4
    skip: 5
